<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>{% block title %}PDF Sender{% endblock %}</title>
  <style>
    :root {
      --bg: #0f1115;
      --card: #1a1d24;
      --muted: #8a93a6;
      --text: #e6e9ef;
      --accent: #5b8cff;
      --accent-hover: #7aa2ff;
      --ok: #4ade80;
      --error: #f87171;
      --border: #2a2f3a;
      --danger: #b34141;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg); color: var(--text);
      display: flex; flex-direction: column; align-items: center; padding: 28px 20px 60px;
    }
    .topbar {
      width: 100%; max-width: 720px; display: flex; justify-content: space-between;
      align-items: center; margin-bottom: 18px; color: var(--muted); font-size: 13px;
    }
    .topbar .brand { color: var(--text); font-weight: 600; font-size: 15px; }
    .topbar a { color: var(--accent); text-decoration: none; }
    .topbar a:hover { color: var(--accent-hover); }
    .topbar .me { display: flex; align-items: center; gap: 12px; }
    .badge { background: var(--accent); color: #fff; padding: 2px 7px; border-radius: 4px; font-size: 11px; }
    .card {
      width: 100%; max-width: 560px; background: var(--card);
      border: 1px solid var(--border); border-radius: 12px; padding: 28px;
    }
    .card.wide { max-width: 720px; }
    h1 { margin: 0 0 6px 0; font-size: 22px; }
    .sub { color: var(--muted); font-size: 14px; margin-bottom: 22px; }
    label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 6px; }
    input[type="email"], input[type="password"], input[type="text"] {
      width: 100%; padding: 10px 12px; background: #11141a; border: 1px solid var(--border);
      color: var(--text); border-radius: 8px; font-size: 14px; outline: none;
    }
    input:focus { border-color: var(--accent); }
    button, .btn {
      display: inline-block; padding: 10px 14px; background: var(--accent); color: white;
      border: 0; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer;
      transition: background .15s; text-decoration: none;
    }
    button:hover, .btn:hover { background: var(--accent-hover); }
    button:disabled { opacity: .5; cursor: not-allowed; }
    button.full { width: 100%; padding: 12px; font-size: 15px; }
    button.danger { background: var(--danger); }
    button.danger:hover { background: #c95252; }
    button.small { padding: 6px 10px; font-size: 12px; }
    .flash { margin-top: 16px; }
    .flash div {
      padding: 8px 12px; border-radius: 6px; margin-bottom: 6px; font-size: 13px;
      white-space: pre-wrap; font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    }
    .flash .ok { background: rgba(74,222,128,.1); color: var(--ok); border: 1px solid rgba(74,222,128,.25); }
    .flash .error { background: rgba(248,113,113,.1); color: var(--error); border: 1px solid rgba(248,113,113,.25); }
    .info {
      background: #11141a; border: 1px solid var(--border); border-radius: 8px;
      padding: 10px 14px; font-size: 13px; color: var(--muted); margin-bottom: 14px;
    }
    .info strong { color: var(--text); }
    table { width: 100%; border-collapse: collapse; margin-top: 12px; font-size: 13px; }
    table th, table td { padding: 10px 8px; border-bottom: 1px solid var(--border); text-align: left; }
    table th { color: var(--muted); font-weight: 500; }
    table tr:last-child td { border-bottom: none; }
    .row-actions { display: flex; gap: 6px; flex-wrap: wrap; }
    details { margin-top: 6px; }
    details summary { color: var(--accent); cursor: pointer; font-size: 12px; }
    details form { margin-top: 8px; display: flex; gap: 6px; }
    details form input { flex: 1; padding: 6px 10px; font-size: 12px; }
    details form button { padding: 6px 10px; font-size: 12px; }
    hr.sep { border: none; border-top: 1px solid var(--border); margin: 20px 0; }
  </style>
</head>
<body>
  {% if user %}
    <div class="topbar">
      <span class="brand">PDF Sender</span>
      <span class="me">
        <span>{{ user.email }}</span>
        {% if user.is_admin %}<span class="badge">admin</span>{% endif %}
        <a href="{{ url_for('logout') }}">Выйти</a>
      </span>
    </div>
  {% endif %}

  {% block content %}{% endblock %}

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      <div class="card" style="margin-top: 14px; padding: 14px;">
        <div class="flash" style="margin: 0;">
          {% for cat, msg in messages %}
            <div class="{{ cat }}">{{ msg }}</div>
          {% endfor %}
        </div>
      </div>
    {% endif %}
  {% endwith %}
</body>
</html>
