{% extends "base.html" %}
{% block title %}Отправка PDF{% endblock %}
{% block content %}
<div class="card">
  <h1>Отправка PDF</h1>
  <div class="sub">Каждый файл уйдёт отдельным письмом</div>

  <div class="info">
    Получатель: <strong>{{ user.email }}</strong><br>
    Отправитель: <strong>myshsender@mail.ru</strong>
  </div>

  <form method="post" action="{{ url_for('send') }}" enctype="multipart/form-data" id="form">
    <label>PDF файлы (можно несколько)</label>
    <div class="drop" id="drop">
      <strong>Выбрать файлы</strong> или перетащи сюда
      <small>только .pdf, до 50&nbsp;МБ каждый</small>
      <input type="file" id="pdfs" name="pdfs" accept="application/pdf,.pdf" multiple required>
    </div>

    <div class="files" id="files"></div>

    <button type="submit" id="submit" class="full" style="margin-top:18px">Отправить</button>
  </form>
</div>

<style>
  .drop {
    border: 1px dashed var(--border); border-radius: 10px;
    padding: 22px; text-align: center; cursor: pointer; transition: all .15s;
    background: #11141a;
  }
  .drop:hover, .drop.drag { border-color: var(--accent); background: #141821; }
  .drop strong { color: var(--accent); }
  .drop small { color: var(--muted); display: block; margin-top: 4px; }
  input[type="file"] { display: none; }
  .files { margin-top: 12px; max-height: 220px; overflow-y: auto; }
  .files .file {
    display: flex; justify-content: space-between; padding: 6px 10px; font-size: 13px;
    border-bottom: 1px solid var(--border);
  }
  .files .file:last-child { border-bottom: none; }
  .files .name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .files .size { color: var(--muted); margin-left: 10px; flex-shrink: 0; }
</style>

<script>
  const drop = document.getElementById('drop');
  const input = document.getElementById('pdfs');
  const list = document.getElementById('files');
  const submit = document.getElementById('submit');

  const fmtSize = b => b < 1024 ? b + ' B' : b < 1024*1024 ? (b/1024).toFixed(1) + ' KB' : (b/1024/1024).toFixed(2) + ' MB';

  function render() {
    list.innerHTML = '';
    const files = Array.from(input.files || []);
    if (!files.length) { submit.textContent = 'Отправить'; return; }
    files.forEach(f => {
      const row = document.createElement('div');
      row.className = 'file';
      row.innerHTML = `<span class="name">${f.name}</span><span class="size">${fmtSize(f.size)}</span>`;
      list.appendChild(row);
    });
    submit.textContent = `Отправить (${files.length} ${files.length === 1 ? 'письмо' : 'писем'})`;
  }

  drop.addEventListener('click', () => input.click());
  input.addEventListener('change', render);

  ['dragenter','dragover'].forEach(ev => drop.addEventListener(ev, e => {
    e.preventDefault(); e.stopPropagation(); drop.classList.add('drag');
  }));
  ['dragleave','drop'].forEach(ev => drop.addEventListener(ev, e => {
    e.preventDefault(); e.stopPropagation(); drop.classList.remove('drag');
  }));
  drop.addEventListener('drop', e => {
    const dropped = Array.from(e.dataTransfer.files).filter(f => f.name.toLowerCase().endsWith('.pdf'));
    if (!dropped.length) return;
    const dt = new DataTransfer();
    dropped.forEach(f => dt.items.add(f));
    input.files = dt.files;
    render();
  });

  document.getElementById('form').addEventListener('submit', () => {
    submit.disabled = true; submit.textContent = 'Отправка…';
  });
</script>
{% endblock %}
